<!-- Gitalk 评论区：基于 GitHub Issues，无需开启 Discussions -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.css">
<script src="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.min.js"></script>
<div id="gitalk-container"></div>
<script>
  var gitalk = new Gitalk({
    clientID: '{{ index site.Params.comment.gitalk "clientID" }}',
    clientSecret: '{{ index site.Params.comment.gitalk "clientSecret" }}',
    repo: '{{ index site.Params.comment.gitalk "repo" }}',
    owner: '{{ index site.Params.comment.gitalk "owner" }}',
    admin: ['{{ index site.Params.comment.gitalk "owner" }}'],
    id: decodeURIComponent(location.pathname),
    distractionFreeMode: false,
    language: 'zh-CN',
    perPage: 10,
    pagerDirection: 'last',
    createIssueManually: false
  });
  gitalk.render('gitalk-container');
</script>
